global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'dns-node-exporter'
    static_configs:
      - targets: ['192.168.0.50:9100']
        labels:
          host: 'dns'
          instance: 'dns-node-exporter'
          type: 'node-exporter'

  - job_name: 'dns-core-dns'
    static_configs:
      - targets: ['192.168.0.50:9153']
        labels:
          host: 'dns'
          instance: 'dns-core-dns'
          type: 'core-dns'
  
  - job_name: 'mail-node-exporter'
    static_configs:
      - targets: ['192.168.0.54:9100']
        labels:
          host: 'mail'
          instance: 'mail-node-exporter'
          type: 'node-exporter'

  - job_name: 'prod-node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          host: 'prod'
          instance: 'prod-node-exporter'
          type: 'node-exporter'