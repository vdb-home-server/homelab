services:
  coredns:
    image: coredns/coredns:latest
    container_name: coredns
    restart: always
    # Expose DNS ports (53) on your Home Server IP
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "9153:9153" # CoreDNS metrics endpoint
    volumes:
      - ./config:/etc/coredns
    command: -conf /etc/coredns/Corefile